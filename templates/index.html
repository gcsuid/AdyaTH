<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Scraper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #0d0A1A, #1A0D2A, #0A141A, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Animated Background Gradients / Prism Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.6;
            animation: float 14s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 70vw;
            height: 70vh;
            background: linear-gradient(135deg, rgba(255, 0, 127, 0.3), rgba(255, 94, 98, 0.1));
            top: -20%;
            left: -10%;
        }

        .orb-2 {
            width: 80vw;
            height: 80vh;
            background: linear-gradient(135deg, rgba(127, 0, 255, 0.3), rgba(225, 0, 255, 0.1));
            bottom: -30%;
            right: -10%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 60vw;
            height: 60vh;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.3), rgba(79, 172, 254, 0.1));
            top: 30%;
            left: 50%;
            animation-delay: -2s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(40px) scale(1.1);
            }
        }

        /* Glassmorphism Container with Prism Edge */
        .glass-panel {
            position: relative;
            z-index: 10;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Prism Light Sweep */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            animation: prism-sweep 7s infinite;
            pointer-events: none;
        }

        @keyframes prism-sweep {
            0% {
                left: -150%;
            }

            30%,
            100% {
                left: 150%;
            }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 15px 0;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-size: 15px;
            color: #a0a0a0;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .highlight {
            color: #fff;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
        }

        /* Glowing Button */
        .btn-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .btn-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border-radius: 50px;
            filter: blur(15px);
            opacity: 0.6;
            z-index: -1;
            transition: opacity 0.3s ease, filter 0.3s ease;
        }

        .btn-wrapper:hover::after {
            opacity: 0.9;
            filter: blur(20px);
        }

        .glowing-btn {
            background: linear-gradient(90deg, #1a1a1a, #2a2a2a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
            font-family: 'Outfit', sans-serif;
        }

        .glowing-btn:hover {
            background: linear-gradient(90deg, #2a2a2a, #3a3a3a);
            transform: translateY(-2px);
            color: #fff;
        }

        .glowing-btn:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            transform: none;
            border-color: rgba(255, 255, 255, 0.02);
        }

        .glowing-btn:disabled+.btn-wrapper::after {
            display: none;
        }

        /* Loader */
        .loader-container {
            display: none;
            margin-top: 30px;
        }

        .prism-loader {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .prism-loader span {
            width: 6px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            animation: equalize 1s infinite ease-in-out;
        }

        .prism-loader span:nth-child(1) {
            animation-delay: 0.1s;
            background: #ff007f;
            box-shadow: 0 0 10px #ff007f;
        }

        .prism-loader span:nth-child(2) {
            animation-delay: 0.2s;
            background: #7f00ff;
            box-shadow: 0 0 10px #7f00ff;
        }

        .prism-loader span:nth-child(3) {
            animation-delay: 0.3s;
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe;
        }

        .prism-loader span:nth-child(4) {
            animation-delay: 0.4s;
            background: #4facfe;
            box-shadow: 0 0 10px #4facfe;
        }

        @keyframes equalize {

            0%,
            100% {
                transform: scaleY(1);
                opacity: 0.5;
            }

            50% {
                transform: scaleY(1.8);
                opacity: 1;
            }
        }

        .loader-text {
            font-size: 14px;
            color: #bbb;
            font-weight: 300;
        }

        /* Status */
        .status-message {
            margin-top: 25px;
            font-size: 14px;
            font-weight: 400;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error {
            color: #ff5e62;
        }

        .success {
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main Interface -->
    <div class="glass-panel">
        <h1>LinkedIn Scraper</h1>
        <p class="subtitle">
            Scrapes posts containing names <span class="highlight">Shayak Mazumder</span> and <span
                class="highlight">Adya</span> in posts from the past 6 months.
        </p>

        <div class="btn-wrapper" id="btnWrapper">
            <button id="scrapeBtn" class="glowing-btn">Initiate Scrape Sequence</button>
        </div>

        <div id="loader" class="loader-container">
            <div class="prism-loader">
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="loader-text">Extracting and refracting data...</div>
        </div>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        document.getElementById('scrapeBtn').addEventListener('click', async () => {
            const btn = document.getElementById('scrapeBtn');
            const wrapper = document.getElementById('btnWrapper');
            const loader = document.getElementById('loader');
            const statusMsg = document.getElementById('statusMessage');

            // UI State Change
            btn.disabled = true;
            wrapper.style.display = 'none';
            loader.style.display = 'block';
            statusMsg.classList.remove('show', 'success', 'error');

            try {
                const response = await fetch('/api/scrape', { method: 'POST' });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);

                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'filtered_apify_results.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);

                    statusMsg.textContent = 'Data extracted globally. Download complete.';
                    statusMsg.className = 'status-message success show';
                } else {
                    const errorData = await response.json();
                    statusMsg.textContent = errorData.error || 'Anomaly detected during extraction.';
                    statusMsg.className = 'status-message error show';
                }
            } catch (error) {
                statusMsg.textContent = 'System malfunctioned during the process.';
                statusMsg.className = 'status-message error show';
            } finally {
                btn.disabled = false;
                wrapper.style.display = 'inline-block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
